name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Validate Index
        run: |
          node -e "const skills = require('./index.json'); if (!Array.isArray(skills) || skills.length === 0) process.exit(1);"
      - name: Check SKILL.md Files
        run: |
          find skills -name "SKILL.md" -exec grep -l "name:" {} + | wc -l
